<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administration — Site Artisan</title>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <!-- Décodeur HEIC WASM complet — supporte tous les formats iPhone (Chrome inclus) -->
  <script type="module">
    try {
      const { default: decode } = await import('https://esm.sh/@jsquash/heic@1.2.0');
      window.__heicDecode = decode;
      console.log('Décodeur HEIC WASM chargé ✓');
    } catch(e) { console.warn('HEIC WASM non chargé, fallback heic2any :', e); }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent:   #111111;
      --bg:       #f4f4f5;
      --panel:    #ffffff;
      --border:   #e4e4e7;
      --muted:    #71717a;
      --success:  #16a34a;
      --danger:   #dc2626;
      --warning:  #d97706;
      --radius:   10px;
      --header-h: 56px;
      --panel-w:  360px;
    }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; color: #111; background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LOGIN ─────────────────────────────────────── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(135deg, #0f0f0f 0%, #1c1c2e 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #fff; border-radius: 18px;
      padding: 2.5rem 2.5rem 2rem;
      width: 340px; text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
    }
    .login-icon {
      width: 54px; height: 54px; border-radius: 14px;
      background: var(--accent); color: #fff; font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.2rem;
    }
    .login-card h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
    .login-card p  { color: var(--muted); font-size: 0.85rem; line-height: 1.5; margin-bottom: 1.2rem; }
    #passwordInput {
      width: 100%; padding: 0.72rem 1rem; margin-bottom: 0.75rem;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 16px; font-family: inherit; text-align: center;
      letter-spacing: 0.05em; transition: border-color 0.15s;
    }
    #passwordInput:focus { outline: none; border-color: #888; }
    #loginError {
      font-size: 0.8rem; color: var(--danger);
      margin-bottom: 0.75rem; display: none; min-height: 1.2em;
    }
    #loginBtn {
      width: 100%; padding: 0.8rem 1.5rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 9999px;
      font-size: 0.93rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    #loginBtn:hover    { opacity: 0.82; }
    #loginBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ─── ADMIN LAYOUT ───────────────────────────────── */
    #adminApp { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ─── HEADER ─────────────────────────────────────── */
    #adminHeader {
      height: var(--header-h); flex-shrink: 0;
      background: #fff; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; gap: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 0.7rem; }
    .header-logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .header-title { font-weight: 700; font-size: 0.95rem; letter-spacing: -0.01em; }
    .header-sub   { font-size: 0.73rem; color: var(--muted); }
    .header-right { display: flex; align-items: center; gap: 0.55rem; }
    #statusMsg {
      font-size: 0.78rem; color: var(--muted); padding: 0 0.4rem; min-width: 80px; text-align: right;
      transition: color 0.25s;
    }
    #statusMsg.saving { color: var(--warning); }
    #statusMsg.saved  { color: var(--success); }
    #statusMsg.error  { color: var(--danger);  }
    .btn-logout {
      padding: 0.38rem 0.9rem; border-radius: 9999px;
      background: none; border: 1px solid var(--border);
      font-size: 0.78rem; color: var(--muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-logout:hover { border-color: #aaa; color: #333; }
    #publishBtn {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.42rem 1.1rem; border-radius: 9999px;
      background: var(--accent); color: #fff;
      border: none; font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s;
    }
    #publishBtn:hover     { opacity: 0.82; }
    #publishBtn:disabled  { opacity: 0.38; cursor: not-allowed; }
    #publishBtn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ─── BODY SPLIT ─────────────────────────────────── */
    .admin-body { flex: 1; overflow: hidden; display: flex; }

    /* ─── LEFT PANEL ─────────────────────────────────── */
    .panel-left {
      width: var(--panel-w); flex-shrink: 0;
      background: var(--bg); border-right: 1px solid var(--border);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel-left::-webkit-scrollbar { width: 5px; }
    .panel-left::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }

    /* ─── ACCORDION ──────────────────────────────────── */
    .section-item { border-bottom: 1px solid var(--border); background: #fff; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1.1rem; cursor: pointer; user-select: none;
      transition: background 0.12s;
    }
    .section-header:hover { background: #fafafa; }
    .section-header-left { display: flex; align-items: center; gap: 0.6rem; }
    .section-icon {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--bg); display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; flex-shrink: 0;
    }
    .section-label { font-weight: 600; font-size: 0.88rem; }
    .section-chevron {
      width: 15px; height: 15px; color: var(--muted);
      transition: transform 0.25s; flex-shrink: 0;
    }
    .section-item.open .section-chevron { transform: rotate(90deg); }
    .section-body { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .section-item.open .section-body { max-height: 5000px; }
    .section-inner { padding: 0.5rem 1.1rem 1.3rem; display: flex; flex-direction: column; gap: 0.85rem; }

    /* ─── FORM FIELDS ────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 0.3rem; }
    .field label { font-size: 0.73rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .field input[type="text"],
    .field textarea {
      width: 100%; padding: 0.52rem 0.75rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.87rem; font-family: inherit; color: #111;
      background: #fff; line-height: 1.5; resize: vertical;
      transition: border-color 0.15s;
    }
    .field input[type="text"]:focus,
    .field textarea:focus { outline: none; border-color: #888; }
    .field textarea { min-height: 76px; }
    .field-hint { font-size: 0.7rem; color: #a1a1aa; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }

    /* ─── IMAGE UPLOAD ───────────────────────────────── */
    .img-upload-wrap { display: flex; align-items: center; gap: 0.75rem; }
    .img-thumb {
      width: 68px; height: 51px; border-radius: 8px;
      object-fit: cover; border: 1.5px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .img-thumb-ph {
      width: 68px; height: 51px; border-radius: 8px;
      border: 1.5px dashed var(--border); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1rem; flex-shrink: 0;
    }
    .btn-upload {
      flex: 1; padding: 0.45rem 0.75rem;
      border: 1.5px dashed #c4c4c8; border-radius: 8px;
      background: none; font-size: 0.78rem; color: var(--muted);
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-upload:hover { border-color: #666; color: #333; }

    /* ─── BADGE CHIPS ────────────────────────────────── */
    .badges-list { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .badge-chip {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #f4f4f5; border: 1px solid var(--border);
      border-radius: 9999px; padding: 0.25rem 0.6rem;
      font-size: 0.77rem; font-weight: 500;
    }
    .badge-chip button {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.82rem; line-height: 1; padding: 0;
      transition: color 0.12s;
    }
    .badge-chip button:hover { color: var(--danger); }
    .badge-add-row { display: flex; gap: 0.4rem; align-items: center; }

    /* ─── LIST ITEMS ─────────────────────────────────── */
    .list-item {
      background: #f9f9fb; border: 1px solid var(--border);
      border-radius: 10px; padding: 0.72rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .list-item-header {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
    }
    .list-item-num { font-size: 0.7rem; font-weight: 700; color: var(--muted); padding-top: 0.1rem; }
    .btn-remove {
      background: none; border: none; cursor: pointer;
      color: #c4c4c8; font-size: 1rem; line-height: 1;
      transition: color 0.12s; padding: 0.1rem; flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--danger); }
    .btn-add-item {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.48rem 0.75rem; border-radius: 8px;
      background: none; border: 1.5px dashed #c4c4c8;
      font-size: 0.8rem; color: var(--muted); cursor: pointer;
      width: 100%; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-add-item:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── SERVICE ITEMS ──────────────────────────────── */
    .service-item {
      background: #f9f9fb; border: 1px solid var(--border);
      border-radius: 10px; padding: 0.72rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.55rem;
    }
    .service-item-header { display: flex; align-items: center; justify-content: space-between; }
    .service-item-num { font-size: 0.72rem; font-weight: 700; color: var(--muted); }
    .service-img-row { display: flex; align-items: center; gap: 0.6rem; }
    .service-thumb {
      width: 58px; height: 43px; border-radius: 7px;
      object-fit: cover; border: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
    }

    /* ─── GALLERY GRID ───────────────────────────────── */
    .gallery-admin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.45rem; }
    .gallery-admin-thumb {
      position: relative; aspect-ratio: 4/3; border-radius: 8px; overflow: hidden;
      background: var(--bg); border: 1.5px solid var(--border);
    }
    .gallery-admin-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-thumb-remove {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.62); color: #fff;
      border: none; font-size: 0.72rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .gallery-thumb-remove:hover { background: var(--danger); }
    .gallery-thumb-add {
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; color: var(--muted);
      border: 1.5px dashed #c4c4c8; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      aspect-ratio: 4/3; border-radius: 8px; background: var(--bg);
    }
    .gallery-thumb-add:hover { border-color: var(--accent); color: var(--accent); }
    .gallery-admin-thumb[draggable="true"] { cursor: grab; }
    .gallery-admin-thumb.dragging { opacity: 0.4; }
    .gallery-admin-thumb.drag-over { outline: 2.5px solid var(--accent); outline-offset: -2px; }

    /* ─── REVIEW ITEMS ───────────────────────────────── */
    .review-item {
      background: #f9f9fb; border: 1px solid var(--border);
      border-radius: 10px; padding: 0.72rem 0.85rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .review-item-header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .review-avatar-sm {
      width: 26px; height: 26px; border-radius: 50%;
      background: #e4e4e7; color: var(--muted);
      font-size: 0.75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .review-name-sm { font-size: 0.82rem; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ─── STATS BOXES ────────────────────────────────── */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }
    .stat-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.7rem 0.8rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .stat-box-lbl { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ─── RIGHT PANEL ────────────────────────────────── */
    .panel-right { flex: 1; display: flex; flex-direction: column; background: #e8e8ec; overflow: hidden; }
    .preview-bar {
      height: 36px; flex-shrink: 0;
      background: #fff; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; font-size: 0.75rem; color: var(--muted);
    }
    .preview-bar-left { display: flex; align-items: center; gap: 0.5rem; }
    .preview-dot { width: 7px; height: 7px; border-radius: 50%; background: #d4d4d8; transition: background 0.4s; }
    .preview-dot.ready { background: #22c55e; }
    #previewFrame { flex: 1; border: none; width: 100%; height: 100%; background: #fff; }

    /* ─── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #111; color: #fff;
      padding: 0.58rem 1.3rem; border-radius: 9999px;
      font-size: 0.84rem; font-weight: 500;
      z-index: 2000; transition: transform 0.3s ease, opacity 0.3s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    #toast.show        { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.toast-ok    { background: var(--success); }
    #toast.toast-error { background: var(--danger); }

    /* ─── RESPONSIVE MOBILE ──────────────────────────── */
    #mobilePreviewBar { display: none; }
    @media (max-width: 700px) {
      #adminApp { height: auto; overflow: visible; }
      .admin-body { flex-direction: column; overflow: visible; height: auto; }
      .panel-left { width: 100%; border-right: none; overflow-y: visible; flex-shrink: 0; }
      .panel-right { display: none; }
      .header-sub { display: none; }
      .header-title { font-size: 0.88rem; max-width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #statusMsg { display: none; }
      .btn-logout { padding: 0.38rem 0.6rem; font-size: 0.72rem; }
      #publishBtn { padding: 0.42rem 0.85rem; font-size: 0.82rem; }
      .field-row { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
      .gallery-thumb-remove { width: 26px; height: 26px; font-size: 0.9rem; top: 6px; right: 6px; }
      .section-inner { padding: 0.5rem 0.9rem 1.1rem; }
      #mobilePreviewBar {
        display: block;
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
        background: #fff; border-top: 1px solid var(--border);
        padding: 0.75rem 1rem;
        box-shadow: 0 -3px 12px rgba(0,0,0,0.08);
      }
      #mobilePreviewBar a {
        display: block; width: 100%; padding: 0.85rem;
        background: var(--accent); color: #fff;
        border-radius: 12px; text-align: center;
        font-size: 0.95rem; font-weight: 700;
        text-decoration: none; letter-spacing: -0.01em;
      }
      .panel-left { padding-bottom: 80px; }
    }
  </style>
</head>
<body>

<!-- ─── LOGIN ─────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">✏️</div>
    <h1>Espace administration</h1>
    <p>Entrez votre mot de passe pour modifier le site.</p>
    <input type="password" id="passwordInput" placeholder="Mot de passe" autocomplete="current-password"/>
    <div id="loginError"></div>
    <button id="loginBtn">Se connecter →</button>
  </div>
</div>

<!-- ─── ADMIN APP ────────────────────────────────── -->
<div id="adminApp" style="display:none;">
  <header id="adminHeader">
    <div class="header-left">
      <div class="header-logo">✏️</div>
      <div>
        <div class="header-title" id="headerSiteName">Mon site</div>
        <div class="header-sub">Administration du contenu</div>
      </div>
    </div>
    <div class="header-right">
      <span id="statusMsg"></span>
      <button class="btn-logout" id="logoutBtn">Déconnexion</button>
      <button id="publishBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12l5 5L19 7"/></svg>
        Publier
      </button>
    </div>
  </header>

  <!-- Barre fixe en bas sur mobile -->
  <div id="mobilePreviewBar">
    <a href="../index.html" target="_blank">👁 Voir le site en direct →</a>
  </div>

  <div class="admin-body">
    <div class="panel-left" id="panelLeft"></div>
    <div class="panel-right">
      <div class="preview-bar">
        <div class="preview-bar-left">
          <span class="preview-dot" id="previewDot"></span>
          <span id="previewLabel">Chargement de l'aperçu…</span>
        </div>
        <span style="font-size:0.7rem;color:#a1a1aa;">Aperçu en direct</span>
      </div>
      <iframe id="previewFrame" src="../index.html" title="Aperçu du site"></iframe>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════ */
const CONFIG = {
  workerUrl: 'https://artisan-cmsa.autosys-agency.workers.dev',
  clientId:  'general-couverture',  // ← REMPLACER par l'identifiant du client (ex: 'jean', 'marie')
  branch:    'main'
};

function repoPath(p) {
  return `${CONFIG.clientId}/${p}`;
}

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let state        = null;
let currentSha   = null;
let adminPassword = '';
const pendingImages = {};
let previewReady = false;
let previewTimer = null;

/* ══════════════════════════════════════════════════
   AUTH — simple mot de passe
══════════════════════════════════════════════════ */
async function tryLogin(password) {
  adminPassword = password;
  // Teste le mot de passe en chargeant le contenu
  return await loadContentFromGit();
}

document.getElementById('loginBtn').addEventListener('click', () => doLogin());
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const pwd = document.getElementById('passwordInput').value.trim();
  if (!pwd) return;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  btn.disabled = true;
  btn.textContent = 'Connexion…';
  errEl.style.display = 'none';
  try {
    const data = await tryLogin(pwd);
    state = data;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display    = 'flex';
    document.getElementById('headerSiteName').textContent = state.nom_entreprise || 'Mon site';
    renderPanel();
    sendPreview();
    setStatus('Prêt', 'saved');
    setTimeout(() => setStatus(''), 2500);
  } catch(err) {
    adminPassword = '';
    errEl.style.display = 'block';
    if (err.message.includes('401')) {
      errEl.textContent = '❌ Mot de passe incorrect';
    } else {
      errEl.textContent = '❌ Erreur : ' + err.message;
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter →';
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  adminPassword = '';
  state = null;
  previewReady = false;
  document.getElementById('adminApp').style.display    = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('passwordInput').value = '';
  document.getElementById('previewDot').classList.remove('ready');
  document.getElementById('previewLabel').textContent = 'Chargement de l\'aperçu…';
});

/* ══════════════════════════════════════════════════
   CLOUDFLARE WORKER API  (remplace Git Gateway)
══════════════════════════════════════════════════ */
async function gitGet(path) {
  const res = await fetch(`${CONFIG.workerUrl}/api/github/${repoPath(path)}`, {
    headers: { Authorization: `Bearer ${adminPassword}` }
  });
  if (!res.ok) throw new Error(`GET ${path} → ${res.status}`);
  return res.json();
}

async function gitPut(path, base64, sha, message) {
  const body = { message, content: base64, branch: CONFIG.branch };
  if (sha) body.sha = sha;
  const res = await fetch(`${CONFIG.workerUrl}/api/github/${repoPath(path)}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${adminPassword}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`PUT ${path} → ${res.status}: ${await res.text()}`);
  return res.json();
}

async function loadContentFromGit() {
  const file = await gitGet('data/content.json');
  currentSha = file.sha;
  const json = decodeURIComponent(escape(atob(file.content.replace(/\n/g, ''))));
  return JSON.parse(json);
}

async function saveContentToGit(data) {
  const json = JSON.stringify(data, null, 2);
  const b64  = btoa(unescape(encodeURIComponent(json)));
  const msg  = `Mise à jour du contenu — ${new Date().toLocaleDateString('fr-FR')}`;
  const result = await gitPut('data/content.json', b64, currentSha, msg);
  if (result.content) currentSha = result.content.sha;
}

async function uploadImage(path, base64) {
  let existingSha = null;
  try { const f = await gitGet(path); existingSha = f.sha; } catch(_) {}
  await gitPut(path, base64, existingSha, `Upload image: ${path}`);
}

// Détecte HEIC/HEIF par magic bytes (plus fiable que l'extension ou le type MIME)
async function isHeicFile(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const arr = new Uint8Array(e.target.result);
        const ftyp = String.fromCharCode(arr[4], arr[5], arr[6], arr[7]);
        if (ftyp === 'ftyp') { resolve(true); return; }
      } catch(_) {}
      const ext = file.name.split('.').pop().toLowerCase();
      const typ = (file.type || '').toLowerCase();
      resolve(['heic','heif'].includes(ext) || typ.includes('heic') || typ.includes('heif'));
    };
    reader.onerror = () => resolve(['heic','heif'].includes(file.name.split('.').pop().toLowerCase()));
    reader.readAsArrayBuffer(file.slice(0, 12));
  });
}

// Convertit un fichier HEIC en Blob JPEG
// Méthode 1 : @jsquash/heic WASM — supporte TOUS les formats HEIC (Chrome, Firefox, Safari)
// Méthode 2 : createImageBitmap natif (Safari)
// Méthode 3 : heic2any (dernier recours)
async function convertHeicToBlob(file) {

  // Méthode 1 : @jsquash/heic WASM (le plus complet)
  if (window.__heicDecode) {
    try {
      const buf = await file.arrayBuffer();
      const imageData = await window.__heicDecode(buf);
      const cvs = document.createElement('canvas');
      cvs.width = imageData.width; cvs.height = imageData.height;
      cvs.getContext('2d').putImageData(imageData, 0, 0);
      return await new Promise(res => cvs.toBlob(res, 'image/jpeg', 0.88));
    } catch(e1) { console.warn('@jsquash/heic échoué :', e1); }
  }

  // Méthode 2 : natif Safari via createImageBitmap
  try {
    const bitmap = await createImageBitmap(file);
    if (bitmap.width > 0 && bitmap.height > 0) {
      const cvs = document.createElement('canvas');
      cvs.width = bitmap.width; cvs.height = bitmap.height;
      cvs.getContext('2d').drawImage(bitmap, 0, 0);
      bitmap.close();
      return await new Promise(res => cvs.toBlob(res, 'image/jpeg', 0.88));
    }
    bitmap.close();
  } catch(_) {}

  // Méthode 3 : heic2any (dernier recours)
  if (typeof heic2any !== 'undefined') {
    try {
      const result = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.88 });
      return Array.isArray(result) ? result[0] : result;
    } catch(e3) { console.warn('heic2any échoué :', e3); }
  }

  throw new Error('Photo iPhone non convertible. Réessayez ou partagez la photo en JPEG depuis l\'app Photos de votre iPhone.');
}

// Convertit n'importe quelle image (y compris HEIC iPhone) en WebP
async function processImageFile(file) {
  const baseName = file.name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9._-]/g, '_');

  let workBlob = file;
  const heic = await isHeicFile(file);
  if (heic) {
    workBlob = await convertHeicToBlob(file);
  }

  // Lecture en dataUrl
  const dataUrl = await new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(workBlob);
  });

  // Compression + conversion WebP via canvas (max 1800px)
  const finalUrl = await new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      const MAX = 1800;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const webp = canvas.toDataURL('image/webp', 0.85);
      resolve(webp.startsWith('data:image/webp') ? webp : canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => resolve(dataUrl); // déjà en JPEG via heic2any, on garde
    img.src = dataUrl;
  });

  return { dataUrl: finalUrl, base64: finalUrl.split(',')[1], fileName: baseName + '.webp' };
}

function fileInputEl(onFile, multiple) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*,.heic,.heif';
  if (multiple) inp.multiple = true;
  inp.style.display = 'none';
  inp.addEventListener('change', async () => {
    for (const file of Array.from(inp.files)) {
      try {
        toast('Traitement de l\'image…', '');
        const result = await processImageFile(file);
        onFile(result);
      } catch(e) {
        toast('❌ ' + e.message, 'toast-error');
        console.error(e);
      }
    }
    inp.value = '';
  });
  return inp;
}

function mkField(label, value, onChange, isTextarea, hint) {
  const wrap = document.createElement('div'); wrap.className = 'field';
  const lbl = document.createElement('label'); lbl.textContent = label;
  wrap.appendChild(lbl);
  let inp;
  if (isTextarea) { inp = document.createElement('textarea'); inp.value = value || ''; }
  else { inp = document.createElement('input'); inp.type = 'text'; inp.value = value || ''; }
  inp.addEventListener('input', () => { onChange(inp.value); schedulePreview(); });
  wrap.appendChild(inp);
  if (hint) { const h = document.createElement('span'); h.className = 'field-hint'; h.textContent = hint; wrap.appendChild(h); }
  return wrap;
}

function mkImgField(label, imgKey, getSrc, setSrc) {
  const wrap = document.createElement('div'); wrap.className = 'field';
  const lbl = document.createElement('label'); lbl.textContent = label;
  wrap.appendChild(lbl);
  const row = document.createElement('div'); row.className = 'img-upload-wrap';
  const currentSrc = pendingImages[imgKey] ? pendingImages[imgKey].dataUrl : adminImgSrc(getSrc());
  if (currentSrc) { const img = document.createElement('img'); img.className = 'img-thumb'; img.src = currentSrc; img.alt = ''; row.appendChild(img); }
  else { const ph = document.createElement('div'); ph.className = 'img-thumb-ph'; ph.textContent = '🖼️'; row.appendChild(ph); }
  const btn = document.createElement('button'); btn.className = 'btn-upload'; btn.textContent = '📁 Changer l\'image';
  const fi = fileInputEl(({ dataUrl, base64, fileName }) => {
    pendingImages[imgKey] = { dataUrl, base64, fileName };
    setSrc(`images/${fileName}`);
    let img = row.querySelector('.img-thumb');
    if (!img) { row.querySelector('.img-thumb-ph')?.remove(); img = document.createElement('img'); img.className = 'img-thumb'; img.alt = ''; row.prepend(img); }
    img.src = dataUrl; schedulePreview();
  });
  btn.addEventListener('click', () => fi.click());
  row.appendChild(btn); wrap.appendChild(row);
  return wrap;
}

function buildGalerie() {
  return makeSection('🖼️', 'Galerie photos', 's_galerie', inner => {
    const grid = document.createElement('div'); grid.className = 'gallery-admin-grid';
    inner.appendChild(grid);
    const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'image/*,.heic,.heif'; fi.multiple = true; fi.style.display = 'none';
    inner.appendChild(fi);
    fi.addEventListener('change', async () => {
      const files = Array.from(fi.files);
      for (const file of files) {
        try {
          toast('Traitement de l\'image…', '');
          const { dataUrl, base64, fileName } = await processImageFile(file);
          const idx = state.galerie.length;
          state.galerie.push({ image: `images/${fileName}`, legende: '' });
          pendingImages[`galerie.${idx}`] = { dataUrl, base64, fileName };
        } catch(e) {
          toast('❌ ' + e.message, 'toast-error');
          console.error(e);
        }
      }
      fi.value = '';
      render(); schedulePreview();
    });
    let dragSrcIdx = -1;
    function render() {
      grid.innerHTML = '';
      state.galerie.forEach((item, i) => {
        const cell = document.createElement('div'); cell.className = 'gallery-admin-thumb';
        cell.draggable = true;
        const src = pendingImages[`galerie.${i}`] ? pendingImages[`galerie.${i}`].dataUrl : adminImgSrc(item.image);
        const img = document.createElement('img'); img.src = src || ''; img.alt = '';
        cell.appendChild(img);
        const rmBtn = document.createElement('button'); rmBtn.className = 'gallery-thumb-remove'; rmBtn.textContent = '×';
        rmBtn.addEventListener('click', () => {
          state.galerie.splice(i, 1);
          const np = {};
          Object.entries(pendingImages).forEach(([k, v]) => {
            if (!k.startsWith('galerie.')) { np[k] = v; return; }
            const idx2 = parseInt(k.split('.')[1]);
            if (idx2 < i) np[k] = v; else if (idx2 > i) np[`galerie.${idx2 - 1}`] = v;
          });
          Object.keys(pendingImages).forEach(k => delete pendingImages[k]);
          Object.assign(pendingImages, np);
          render(); schedulePreview();
        });
        // ── Drag & drop reordering ──
        cell.addEventListener('dragstart', e => {
          dragSrcIdx = i;
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(() => cell.classList.add('dragging'), 0);
        });
        cell.addEventListener('dragend', () => {
          cell.classList.remove('dragging');
          grid.querySelectorAll('.gallery-admin-thumb').forEach(c => c.classList.remove('drag-over'));
        });
        cell.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (i !== dragSrcIdx) {
            grid.querySelectorAll('.gallery-admin-thumb').forEach(c => c.classList.remove('drag-over'));
            cell.classList.add('drag-over');
          }
        });
        cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
        cell.addEventListener('drop', e => {
          e.preventDefault();
          if (dragSrcIdx === -1 || dragSrcIdx === i) return;
          // Reorder state.galerie
          const [moved] = state.galerie.splice(dragSrcIdx, 1);
          state.galerie.splice(i, 0, moved);
          // Remap pendingImages galerie keys
          const gSnap = {};
          Object.entries(pendingImages).forEach(([k, v]) => {
            if (k.startsWith('galerie.')) gSnap[parseInt(k.split('.')[1])] = v;
          });
          Object.keys(pendingImages).filter(k => k.startsWith('galerie.')).forEach(k => delete pendingImages[k]);
          const oldOrder = Array.from({ length: state.galerie.length }, (_, j) => j);
          const [mi] = oldOrder.splice(dragSrcIdx, 1);
          oldOrder.splice(i, 0, mi);
          oldOrder.forEach((oldIdx, newIdx) => { if (gSnap[oldIdx]) pendingImages[`galerie.${newIdx}`] = gSnap[oldIdx]; });
          dragSrcIdx = -1;
          render(); schedulePreview();
        });
        cell.appendChild(rmBtn); grid.appendChild(cell);
      });
      const addCell = document.createElement('div'); addCell.className = 'gallery-thumb-add'; addCell.textContent = '+';
      addCell.addEventListener('click', () => fi.click());
      grid.appendChild(addCell);
    }
    render();
  });
}

function buildFaq() {
  return makeSection('❓', 'FAQ', 's_faq', inner => {
    const listEl = document.createElement('div'); listEl.style.cssText = 'display:flex;flex-direction:column;gap:0.6rem;';
    inner.appendChild(listEl);
    function render() {
      listEl.innerHTML = '';
      state.faq.forEach((q, i) => {
        const item = document.createElement('div'); item.className = 'list-item';
        const hdr = document.createElement('div'); hdr.className = 'list-item-header';
        const num = document.createElement('span'); num.className = 'list-item-num'; num.textContent = `Q${i + 1}`;
        const del = document.createElement('button'); del.className = 'btn-remove'; del.textContent = '×';
        del.addEventListener('click', () => { state.faq.splice(i, 1); render(); schedulePreview(); });
        hdr.appendChild(num); hdr.appendChild(del); item.appendChild(hdr);
        item.appendChild(mkField('Question', q.question, v => { state.faq[i].question = v; schedulePreview(); }));
        item.appendChild(mkField('Réponse',  q.reponse,  v => { state.faq[i].reponse  = v; schedulePreview(); }, true));
        listEl.appendChild(item);
      });
      const addBtn = document.createElement('button'); addBtn.className = 'btn-add-item'; addBtn.textContent = '+ Ajouter une question';
      addBtn.addEventListener('click', () => { state.faq.push({ question: 'Nouvelle question ?', reponse: '' }); render(); schedulePreview(); });
      listEl.appendChild(addBtn);
    }
    render();
  });
}

function buildContactFooter() {
  return makeSection('📞', 'Contact & Footer', 's_contact', inner => {
    inner.appendChild(mkField('Texte section Contact', state.contact_description, v => { state.contact_description = v; schedulePreview(); }, true));
    inner.appendChild(mkField('Texte Footer',          state.footer_description,  v => { state.footer_description  = v; schedulePreview(); }, true));
  });
}

/* ══════════════════════════════════════════════════
   PUBLISH
══════════════════════════════════════════════════ */
document.getElementById('publishBtn').addEventListener('click', async () => {
  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  setStatus('Publication…', 'saving');
  try {
    const keys = Object.keys(pendingImages);
    const imgErrors = [];
    for (const k of keys) {
      const { base64, fileName } = pendingImages[k];
      setStatus(`Upload : ${fileName}`, 'saving');
      try {
        await uploadImage(`images/${fileName}`, base64);
        delete pendingImages[k];
      } catch(imgErr) {
        console.error('Image non uploadée :', fileName, imgErr);
        imgErrors.push(fileName);
        // On ne bloque pas — on continue quand même
      }
    }
    setStatus('Sauvegarde du contenu…', 'saving');
    await saveContentToGit(state);
    if (imgErrors.length > 0) {
      setStatus('Publié (images partielles)', 'saved');
      toast(`Contenu publié ✓ — ${imgErrors.length} image(s) échouée(s) : ${imgErrors.join(', ')}`, 'toast-error');
    } else {
      setStatus('Publié ✓', 'saved');
      toast('Site publié avec succès ! 🎉', 'toast-ok');
    }
    setTimeout(() => setStatus(''), 4000);
  } catch(err) {
    console.error(err);
    setStatus('Erreur', 'error');
    toast('Erreur publication : ' + err.message, 'toast-error');
  } finally {
    btn.disabled = false;
  }
});
</script>
